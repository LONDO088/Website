<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SUPERMARK PAY</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google OAuth -->
    <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>SUPERMARK PAY</h1>
                <h2>Masuk ke Akun</h2>
                <p>Silakan pilih cara masuk</p>
            </div>
            
            <!-- Google Login Button -->
            <div class="google-login">
                <div class="g-signin2" data-onsuccess="onGoogleSignIn" data-theme="light" data-width="300"></div>
            </div>
            
            <div class="auth-divider">
                <span>atau masuk dengan</span>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email atau Username</label>
                    <input type="text" id="email" class="form-control" placeholder="contoh@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="********">
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox"> Ingat saya
                    </label>
                    <a href="#" class="forgot-password">Lupa password?</a>
                </div>
                
                <button type="submit" class="btn-auth">Masuk</button>
            </form>
            
            <div class="auth-footer">
                <p>Belum punya akun? <a href="/register.html">Daftar sekarang</a></p>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/api/github.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
