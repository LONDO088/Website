<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - SUPERMARK PAY</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google OAuth -->
    <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>SUPERMARK PAY</h1>
                <h2>Buat Akun Baru</h2>
                <p>Pilih cara daftar yang Anda inginkan</p>
            </div>
            
            <!-- Google Register Button -->
            <div class="google-login">
                <div class="g-signin2" data-onsuccess="onGoogleSignIn" data-theme="light" data-width="300" data-longtitle="true" data-text="Daftar dengan Google"></div>
            </div>
            
            <div class="auth-divider">
                <span>atau daftar manual</span>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" class="form-control" placeholder="Masukkan nama lengkap" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="contoh@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
                    <small class="form-text">Hanya huruf kecil, angka, dan underscore</small>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Masukkan ulang password" required>
                </div>
                
                <!-- Avatar Selection -->
                <div class="form-group">
                    <label>Pilih Avatar</label>
                    <div class="avatar-selection">
                        <!-- Cowok -->
                        <div class="avatar-option" onclick="selectAvatar('cowok1')">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=boy1&gender=male" alt="Cowok 1">
                            <span>Cowok 1</span>
                        </div>
                        <div class="avatar-option" onclick="selectAvatar('cowok2')">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=boy2&gender=male" alt="Cowok 2">
                            <span>Cowok 2</span>
                        </div>
                        <div class="avatar-option" onclick="selectAvatar('cowok3')">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=boy3&gender=male" alt="Cowok 3">
                            <span>Cowok 3</span>
                        </div>
                        
                        <!-- Cewek -->
                        <div class="avatar-option" onclick="selectAvatar('cewek1')">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=girl1&gender=female" alt="Cewek 1">
                            <span>Cewek 1</span>
                        </div>
                        <div class="avatar-option" onclick="selectAvatar('cewek2')">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=girl2&gender=female" alt="Cewek 2">
                            <span>Cewek 2</span>
                        </div>
                        <div class="avatar-option" onclick="selectAvatar('cewek3')">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=girl3&gender=female" alt="Cewek 3">
                            <span>Cewek 3</span>
                        </div>
                    </div>
                    <input type="hidden" id="avatar" value="cowok1">
                </div>
                
                <div class="form-terms">
                    <label class="checkbox">
                        <input type="checkbox" required> Saya menyetujui 
                        <a href="#">Syarat & Ketentuan</a> dan 
                        <a href="#">Kebijakan Privasi</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-auth">Daftar</button>
            </form>
            
            <div class="auth-footer">
                <p>Sudah punya akun? <a href="/login.html">Masuk</a></p>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/api/github.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
